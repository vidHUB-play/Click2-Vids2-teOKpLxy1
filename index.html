<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Full Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ececec;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    width:100%;
    padding:20px;
}

h1{
    font-size:clamp(24px,4vw,42px);
    margin-bottom:25px;
}

.card{
    position:relative;
    max-width:700px;
    width:100%;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.2);
    cursor:pointer;
}

.card img{
    width:100%;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    background:red;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px rgba(255,0,0,.5);
}

.play:before{
    content:"";
    border-left:28px solid white;
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    margin-left:8px;
}

.text{
    margin-top:20px;
    font-size:28px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    background:#ff4d4d;
    color:white;
    text-decoration:none;
    padding:18px 40px;
    border-radius:12px;
    font-size:30px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#ff2020;
}

@media(max-width:768px){

.play{
    width:70px;
    height:70px;
}

.play:before{
    border-left:22px solid white;
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
}

.text{
    font-size:20px;
}

.btn{
    font-size:24px;
    padding:15px 30px;
}

}
</style>
</head>
<body>

<div class="container">

<h1>Watch the Full Video 👇</h1>

<div class="card" onclick="goLink()">
    <img src="https://cdn.aceimg.com/dzUE5EBz5.jpg" alt="">
    <div class="play"></div>
</div>

<div class="text">
    Don’t miss what happens next... 👀
</div>

<a href="https://t.co/SaVgnKABd3" class="btn">
▶ PLAY VID
</a>

</div>

<script>
function goLink(){
    window.location.href="https://vidhub-play.github.io/Watch-Vids-teOKpLxy1/";
}
</script>

</body>
</html>
